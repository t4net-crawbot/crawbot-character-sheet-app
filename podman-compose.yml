version: "3.9"
services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: charsheet
      POSTGRES_USER: charsheet
      POSTGRES_PASSWORD: charsheet_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charsheet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://charsheet:charsheet_dev@db:5432/charsheet?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
